<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./src/assets/images/abstract.png">
    <link rel="stylesheet" href="./src/styles/style.css">
    <title>Cadastre-se</title>
</head>

<body>
    <section class="container">

        <div class="image-bg"></div>

        <div class="forms">

            <h1>Create your Free Account</h1>

            <form action="./src/pages/sucesso.html" id="formulario">

                <label for="nome">Full Name</label>
                <input id="nome" type="text" placeholder="Fabio de Araujo Silva" required>

                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="example@gmail.com" required>

                <label for="senha">Password</label>
                <input id="senha" type="password" placeholder="********" required>

                <label for="confirmar-senha">Confirm Password</label>
                <input id="confirmar-senha" type="password" placeholder="********" required>
                <span id="erro-msg" class="erro-msg"></span>

                <button id="cadastrar" type="submit">Create Account</button>
                <span class="have-account">Already have a account? <a href="">Log in</a></span>
            </form>


        <script src="./src/scripts/main.js"></script>
    </section>
</body>

</html>
